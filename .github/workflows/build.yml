name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set active Xcode path
        run: |
          set -x
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          rsync -a $GITHUB_WORKSPACE/ /Users/Shared/telegram-ios/

      # ✅ 关键修复：干掉 APS entitlement 检查
      - name: Patch Telegram build system (disable APS check)
        run: |
          set -x
          cd /Users/Shared/telegram-ios

          # 方法1：直接替换关键字（最稳）
          sed -i '' 's/aps-environment/aps-environment-disabled/g' build-system/Make/Make.py

          # 可选：防止其他 entitlement 检查（更保险）
          sed -i '' 's/get-task-allow/get-task-allow-disabled/g' build-system/Make/Make.py

      - name: Build the App
        run: |
          set -x

          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd "$SOURCE_DIR"

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT=$((COMMIT_COUNT + BUILD_NUMBER_OFFSET))
          export BUILD_NUMBER="$COMMIT_COUNT"

          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --overrideXcodeVersion \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"

          IPA_FILE=$(find bazel-out -name "Telegram.ipa" | head -n 1)
          cp "$IPA_FILE" "$OUTPUT_PATH/"

          mkdir -p build/DSYMs
          find bazel-out -name "*.dSYM" -exec cp -R {} build/DSYMs/ \;

          zip -r "$OUTPUT_PATH/Telegram.DSYMs.zip" build/DSYMs >/dev/null

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: Telegram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            An unsigned build of Telegram for iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          files: |
            /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
            /Users/Shared/telegram-ios/build/artifacts/Telegram.DSYMs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
