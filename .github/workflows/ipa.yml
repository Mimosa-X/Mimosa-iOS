name: Build Telegram iOS IPA (No Codesign)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          brew install bazelisk
          brew install yasm

      - name: Prepare cache dir
        run: mkdir -p $HOME/telegram-bazel-cache

      # ✅ 核心修复：跳过 Xcode 版本限制
      - name: Patch Xcode version check
        run: |
          echo "Patching Make.py to ignore Xcode version check..."
          sed -i '' 's/exit(1)/# exit(1)/g' build-system/Make/Make.py

      # ✅ 生成工程
      - name: Generate Xcode Project
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            generateProject \
            --configurationPath=build-system/appstore-configuration.json \
            --xcodeManagedCodesigning \
            --disableProvisioningProfiles

      # ✅ 构建
      - name: Build app
        run: |
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            build \
            --configurationPath=build-system/appstore-configuration.json \
            --xcodeManagedCodesigning \
            --disableProvisioningProfiles \
            --buildNumber=100001 \
            --configuration=release_arm64

      # ✅ 打包 IPA
      - name: Package IPA
        run: |
          mkdir -p Payload

          APP_PATH=$(find bazel-bin -name "*.app" | head -n 1)

          echo "App path: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found"
            exit 1
          fi

          cp -R "$APP_PATH" Payload/

          zip -r Telegram.ipa Payload

      # ✅ 上传产物
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-IPA
          path: Telegram.ipa
